<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="Nosotros.html">Nosotros</a>
        <a href="contenido.html">Contenido</a>
        <a href="galeria.html">Galeria</a>

    </nav>

    <main class="contenedor">
        <h1>Contacto 📬</h1>
        <p>¿Tienes alguna duda, sugerencia o simplemente quieres saludarnos? Déjanos tu mensaje y nos pondremos en contacto contigo.</p>
        
        <div class="seccion-redes">
            <h3>También nos puedes encontrar en:</h3>
            <div class="contenedor-iconos">
                
                <a href="https://www.instagram.com/createc.periodico?igsh=MWE1NjJid2xucWFsNg==" target="_blank" class="icono-red instagram">
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="https://www.facebook.com/share/1bTSSz65PC/" target="_blank" class="icono-red facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>
                
                <a href="mailto:somoscreatecperiodico@gmail.com" target="_blank" class="icono-red gmail">
    <i class="fa-solid fa-envelope"></i>
</a>
                

            </div>
        </div>
        
        <form class="formulario-contacto">
            <div class="grupo-input">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
            </div>

            <div class="grupo-input">
                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="tu@correo.com" required>
            </div>

            <div class="grupo-input">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
            </div>

            <button type="submit" class="boton-redireccion">Enviar Mensaje ✨</button>
        </form>
    </main>

    <footer>
        <p>© 2026 Mi Página Web - Todos los derechos reservados</p>
    </footer>

</body>
</html>
